<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Node.js official brand: filled hex #539E43, white wordmark -->
  <rect width="512" height="512" rx="96" fill="#1a1a1a"/>
  <!-- Filled hexagon (flat-top orientation, matching Node.js brand) -->
  <polygon points="256,96 404,180 404,332 256,416 108,332 108,180"
           fill="#539E43"/>
  <!-- "NODE" text -->
  <text x="256" y="278" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="82" fill="white"
        letter-spacing="-2">NODE</text>
  <!-- ".JS" subscript -->
  <text x="256" y="330" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="44" fill="white"
        letter-spacing="2">.JS</text>
</svg>
