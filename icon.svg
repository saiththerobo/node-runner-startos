<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#215732"/>
      <stop offset="100%" stop-color="#3d8a4e"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Node.js hexagon logo shape -->
  <g transform="translate(256,248)">
    <!-- Outer hex -->
    <polygon points="0,-112 97,-56 97,56 0,112 -97,56 -97,-56"
             fill="none" stroke="white" stroke-width="14" stroke-linejoin="round"/>
    <!-- N letter -->
    <text x="0" y="38" text-anchor="middle"
          font-family="Arial, Helvetica, sans-serif"
          font-weight="900" font-size="130" fill="white"
          letter-spacing="-4">N</text>
  </g>
  <!-- "node" label -->
  <text x="256" y="415" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700" font-size="48" fill="white" opacity="0.85"
        letter-spacing="6">node</text>
</svg>
